name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # postgres.js connects lazily, so a dummy URL is enough for build/typecheck.
      DATABASE_URL: postgres://user:pass@localhost:5432/db
      BETTER_AUTH_SECRET: ci-dummy-secret-not-used
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm biome ci .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
