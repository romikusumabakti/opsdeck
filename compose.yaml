services:
  postgres:
    image: postgres:18
    container_name: dss-panel-postgres
    restart: always
    mem_limit: 1g
    mem_reservation: 256m
    # shared_buffers defaults to 128MB; bump via command/conf if you raise the
    # limit. Postgres is the biggest non-app consumer under load.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-dss_panel}
      TZ: Asia/Jakarta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      start_period: 10s

  app:
    build:
      context: .
    container_name: dss-panel-app
    # No published port: the app is internal. Caddy (below) is the only public
    # surface — it terminates TLS and forwards with X-Forwarded-* headers so
    # Next derives the public host/port (no more internal :3000 leaking into
    # redirects).
    expose:
      - "3000"
    # RAM caps. mem_limit is the kernel hard ceiling (cgroup) — enforced by
    # `docker compose up` (unlike deploy.resources.limits, which only applies
    # under Swarm). NODE_OPTIONS --max-old-space-size keeps V8's heap ~75% of
    # the container limit so it GCs before the kernel OOM-kills the container
    # (SIGKILL = no graceful shutdown). Raise both together if the app OOMs.
    mem_limit: 1g
    mem_reservation: 512m
    environment:
      NODE_OPTIONS: "--max-old-space-size=768"
      # App connection string. Set explicitly in .env so passwords with special
      # characters don't break URL parsing (no string concat from POSTGRES_*).
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      # Auth
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      # Whitelabel branding — surfaced to the client via NEXT_PUBLIC_*
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME-}
      NEXT_PUBLIC_COMPANY_NAME: ${NEXT_PUBLIC_COMPANY_NAME-}
      NEXT_PUBLIC_ALLOWED_EMAIL_DOMAIN: ${NEXT_PUBLIC_ALLOWED_EMAIL_DOMAIN-}
      # Email (Resend) — optional; email features disabled if empty.
      # When EMAIL_FROM is unset, lib/branding.ts derives a default from
      # NEXT_PUBLIC_APP_NAME + NEXT_PUBLIC_ALLOWED_EMAIL_DOMAIN.
      RESEND_API_KEY: ${RESEND_API_KEY-}
      EMAIL_FROM: ${EMAIL_FROM-}
      # Background jobs (BullMQ). The in-process worker (started via Next's
      # instrumentation hook) and the enqueue side both connect to Valkey over
      # the compose network. Valkey is Redis-compatible; BullMQ speaks the Redis
      # protocol.
      REDIS_URL: ${REDIS_URL:-redis://valkey:6379}
      # Object storage (Garage) for knowledge-base attachments. Endpoint is the
      # in-network S3 API; bucket + key are provisioned once via the garage CLI
      # (see README). The app reaches Garage over the compose network only.
      # ACCESS/SECRET are NOT required at boot: they only exist after Garage is
      # provisioned (chicken-and-egg — the stack must come up first to run the
      # garage CLI). Empty default lets the app boot; uploads fail with 502 until
      # the keys are filled in and the app is restarted. Everything else works.
      S3_ENDPOINT: ${S3_ENDPOINT:-http://garage:3900}
      S3_REGION: ${S3_REGION:-garage}
      S3_BUCKET: ${S3_BUCKET:-knowledge}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY-}
      S3_SECRET_KEY: ${S3_SECRET_KEY-}
      # Image processing (imgproxy). The app signs URLs with the same KEY/SALT
      # the imgproxy service verifies, then fetches transformed images over the
      # compose network — imgproxy itself is never exposed to the browser.
      IMGPROXY_URL: ${IMGPROXY_URL:-http://imgproxy:8080}
      IMGPROXY_KEY: ${IMGPROXY_KEY:?IMGPROXY_KEY is required}
      IMGPROXY_SALT: ${IMGPROXY_SALT:?IMGPROXY_SALT is required}
    healthcheck:
      # Use Node's built-in fetch — `curl`/`wget` aren't in node:24-alpine.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      start_period: 100s
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      garage:
        condition: service_started
      imgproxy:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    container_name: dss-panel-caddy
    restart: always
    mem_limit: 128m
    # Public edge: reverse-proxies to the app. HTTP only (no TLS) — see Caddyfile.
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: dss-panel-garage
    restart: always
    mem_limit: 512m
    # Secrets via env (not committed garage.toml). Generate once:
    #   GARAGE_RPC_SECRET=$(openssl rand -hex 32)
    #   GARAGE_ADMIN_TOKEN=$(openssl rand -base64 32)
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:?GARAGE_RPC_SECRET is required}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:?GARAGE_ADMIN_TOKEN is required}
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data

  imgproxy:
    image: ghcr.io/imgproxy/imgproxy:v4.0.6
    container_name: dss-panel-imgproxy
    restart: always
    # imgproxy decodes images into memory — IMGPROXY_MAX_SRC_RESOLUTION /
    # concurrency drive peak. 512m headroom for AVIF/WebP transforms.
    mem_limit: 512m
    # Internal only — no published port. The app reaches it over the compose
    # network and is the single public surface; imgproxy is never exposed.
    environment:
      # URL signing — must match the app's IMGPROXY_KEY/IMGPROXY_SALT. Generate:
      #   IMGPROXY_KEY:  openssl rand -hex 32
      #   IMGPROXY_SALT: openssl rand -hex 32
      IMGPROXY_KEY: ${IMGPROXY_KEY:?IMGPROXY_KEY is required}
      IMGPROXY_SALT: ${IMGPROXY_SALT:?IMGPROXY_SALT is required}
      # Source images straight from Garage (S3). Reuses the app's S3 key.
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: ${S3_ENDPOINT:-http://garage:3900}
      IMGPROXY_S3_REGION: ${S3_REGION:-garage}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY-}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY-}
      # Only ever serve from our own bucket, and negotiate modern formats from
      # the forwarded Accept header (AVIF → WebP → original).
      IMGPROXY_ALLOWED_SOURCES: ${IMGPROXY_ALLOWED_SOURCES:-s3://knowledge/}
      IMGPROXY_AUTO_WEBP: "true"
      IMGPROXY_AUTO_AVIF: "true"
    depends_on:
      garage:
        condition: service_started

  valkey:
    image: valkey/valkey:8-alpine
    container_name: dss-panel-valkey
    restart: always
    mem_limit: 256m
    # Cap Valkey's own dataset below the container limit so it evicts instead of
    # being OOM-killed.
    command: ["valkey-server", "--maxmemory", "192mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  valkey_data:
  garage_meta:
  garage_data:
  caddy_data:
  caddy_config:
