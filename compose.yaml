services:
  db:
    image: postgres:18
    container_name: dss-panel-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Jakarta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      start_period: 10s

  app:
    build:
      context: .
    container_name: dss-panel-app
    ports:
      - "80:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # Host URL for Inngest to find the app
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      # Auth
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      # Email (Resend)
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      start_period: 100s
    depends_on:
      db:
        condition: service_healthy

  inngest:
    container_name: inngest_dev
    image: inngest/inngest
    environment:
      # Automatically discover Inngest functions in the Next.js app
      # 'app' refers to the service name defined above
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY}
    ports:
      - "8288:8288"
    volumes:
      # Optional: Persist Inngest event history
      - inngest_data:/var/lib/inngest

volumes:
  postgres_data:
  inngest_data:
