services:
  postgres:
    image: postgres:18
    container_name: dss-panel-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-dss_panel}
      TZ: Asia/Jakarta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      start_period: 10s

  app:
    build:
      context: .
    container_name: dss-panel-app
    ports:
      - "80:3000"
    environment:
      # App connection string. Set explicitly in .env so passwords with special
      # characters don't break URL parsing (no string concat from POSTGRES_*).
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      # Host URL for Inngest to find the app
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      # Auth
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      # Email (Resend) — optional; email features disabled if empty
      RESEND_API_KEY: ${RESEND_API_KEY-}
      EMAIL_FROM: ${EMAIL_FROM-Admin Panel <no-reply@example.com>}
      # Inngest — `INNGEST_DEV=<url>` puts the SDK in dev mode (no signature
      # verification, matching the `inngest dev` server's insecure mode) and
      # points it at the sibling container over the compose network.
      INNGEST_DEV: http://inngest:8288
    healthcheck:
      # Use Node's built-in fetch — `curl`/`wget` aren't in node:24-alpine.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      start_period: 100s
    depends_on:
      postgres:
        condition: service_healthy

  inngest:
    container_name: dss-panel-inngest
    image: inngest/inngest
    restart: unless-stopped
    # `dev` runs the single-binary in-memory mode (event API + executor + UI on
    # one port). `-u` registers the panel's /api/inngest endpoint so functions
    # can be discovered and invoked over the compose network.
    command: ["inngest", "dev", "-u", "http://app:3000/api/inngest"]
    environment:
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-local}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:-local}
    ports:
      - "8288:8288"
    volumes:
      - inngest_data:/var/lib/inngest
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
  inngest_data:
