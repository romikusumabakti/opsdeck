services:
  postgres:
    image: postgres:18
    container_name: dss-panel-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-dss_panel}
      TZ: Asia/Jakarta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      start_period: 10s

  app:
    build:
      context: .
    container_name: dss-panel-app
    ports:
      - "80:3000"
    environment:
      # App connection string. Set explicitly in .env so passwords with special
      # characters don't break URL parsing (no string concat from POSTGRES_*).
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      # Host URL for Inngest to find the app
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      # Auth
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      # Email (Resend) — optional; email features disabled if empty
      RESEND_API_KEY: ${RESEND_API_KEY-}
      EMAIL_FROM: ${EMAIL_FROM-Admin Panel <no-reply@example.com>}
      # Inngest — point the SDK at the sibling container over the compose network
      INNGEST_BASE_URL: http://inngest:8288
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-local}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      start_period: 100s
    depends_on:
      postgres:
        condition: service_healthy

  inngest:
    container_name: dss-panel-inngest
    image: inngest/inngest
    environment:
      # Automatically discover Inngest functions in the Next.js app
      # 'app' refers to the service name defined above
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-local}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:-local}
    ports:
      - "8288:8288"
    volumes:
      # Optional: Persist Inngest event history
      - inngest_data:/var/lib/inngest

volumes:
  postgres_data:
  inngest_data:
