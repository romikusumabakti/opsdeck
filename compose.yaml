services:
  postgres:
    image: postgres:18
    container_name: dss-panel-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-dss_panel}
      TZ: Asia/Jakarta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      start_period: 10s

  app:
    build:
      context: .
    container_name: dss-panel-app
    ports:
      - "80:3000"
    environment:
      # App connection string. Set explicitly in .env so passwords with special
      # characters don't break URL parsing (no string concat from POSTGRES_*).
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      # Auth
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      # Whitelabel branding — surfaced to the client via NEXT_PUBLIC_*
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME-}
      NEXT_PUBLIC_COMPANY_NAME: ${NEXT_PUBLIC_COMPANY_NAME-}
      NEXT_PUBLIC_ALLOWED_EMAIL_DOMAIN: ${NEXT_PUBLIC_ALLOWED_EMAIL_DOMAIN-}
      # Email (Resend) — optional; email features disabled if empty.
      # When EMAIL_FROM is unset, lib/branding.ts derives a default from
      # NEXT_PUBLIC_APP_NAME + NEXT_PUBLIC_ALLOWED_EMAIL_DOMAIN.
      RESEND_API_KEY: ${RESEND_API_KEY-}
      EMAIL_FROM: ${EMAIL_FROM-}
      # Inngest — production self-hosted. `INNGEST_DEV=0` forces production
      # mode (signature verification on); `INNGEST_BASE_URL` points the SDK at
      # the self-hosted server's event API over the compose network instead of
      # Inngest Cloud. Keys must match the `inngest` service.
      INNGEST_DEV: "0"
      INNGEST_BASE_URL: http://inngest:8288
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:?INNGEST_EVENT_KEY is required}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:?INNGEST_SIGNING_KEY is required}
    healthcheck:
      # Use Node's built-in fetch — `curl`/`wget` aren't in node:24-alpine.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      start_period: 100s
    depends_on:
      postgres:
        condition: service_healthy

  valkey:
    image: valkey/valkey:8-alpine
    container_name: dss-panel-valkey
    restart: always
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  inngest:
    container_name: dss-panel-inngest
    image: inngest/inngest
    restart: unless-stopped
    # `start` runs production mode: durable queue + state in external Postgres
    # and Valkey/Redis (not in-memory like `dev`). Apps are registered via sync
    # (see README), not the dev-only `-u` flag. INNGEST_POSTGRES_URI must point
    # at a dedicated `inngest` database — create it once; it is separate from
    # the app's own database.
    command: ["inngest", "start"]
    environment:
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:?INNGEST_EVENT_KEY is required}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:?INNGEST_SIGNING_KEY is required}
      INNGEST_POSTGRES_URI: ${INNGEST_POSTGRES_URI:?INNGEST_POSTGRES_URI is required}
      INNGEST_REDIS_URI: redis://valkey:6379
    ports:
      - "8288:8288"
    volumes:
      - inngest_data:/var/lib/inngest
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

volumes:
  postgres_data:
  inngest_data:
  valkey_data:
